<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Sistem Keuangan BRI & Grafik</title>
                <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                    <style>
                            :root { --bri-blue: #00529C; --bri-orange: #F37021; }
                                    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
                                            .container { background: white; padding: 20px; max-width: 500px; margin: auto; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
                                                    .header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
                                                            .saldo-utama { background: var(--bri-blue); color: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: left; }
                                                                    .saldo-label { font-size: 0.85rem; opacity: 0.9; }
                                                                            .saldo-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }
                                                                                    .form-box { background: #f9f9f9; padding: 15px; border-radius: 10px; border: 1px solid #eee; }
                                                                                            input, select, button { width: 100%; padding: 12px; margin: 6px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
                                                                                                    button { background: var(--bri-orange); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
                                                                                                            button:hover { filter: brightness(1.1); }
                                                                                                                    .tabs { display: flex; gap: 5px; margin-top: 20px; }
                                                                                                                            .tab-btn { padding: 8px; font-size: 0.75rem; background: #eee; color: #666; cursor: pointer; border: none; flex: 1; border-radius: 5px; }
                                                                                                                                    .tab-btn.active { background: var(--bri-blue); color: white; }
                                                                                                                                            .chart-box { height: 250px; margin: 20px 0; }
                                                                                                                                                    table { width: 100%; margin-top: 15px; border-collapse: collapse; font-size: 0.85rem; }
                                                                                                                                                            th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid #eee; }
                                                                                                                                                                    td { padding: 12px 10px; border-bottom: 1px solid #f5f5f5; }
                                                                                                                                                                            .amount { font-weight: bold; }
                                                                                                                                                                                    .in { color: #2ecc71; }
                                                                                                                                                                                            .out { color: #e74c3c; }
                                                                                                                                                                                                    .btn-reset { background: #95a5a6; margin-top: 20px; font-size: 0.7rem; padding: 5px; }
                                                                                                                                                                                                        </style>
                                                                                                                                                                                                        </head>
                                                                                                                                                                                                        <body>

                                                                                                                                                                                                        <div class="container">
                                                                                                                                                                                                            <div class="header">
                                                                                                                                                                                                                    <h2>Catatan Keuangan</h2>
                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                            <div class="saldo-utama">
                                                                                                                                                                                                                                    <div class="saldo-label">Total Keseluruhan (Bank BRI)</div>
                                                                                                                                                                                                                                            <div id="total-saldo" class="saldo-value">Rp 0</div>
                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                    <div class="form-box">
                                                                                                                                                                                                                                                            <select id="tipe">
                                                                                                                                                                                                                                                                        <option value="masuk">Pemasukan (+)</option>
                                                                                                                                                                                                                                                                                    <option value="keluar">Pengeluaran (-)</option>
                                                                                                                                                                                                                                                                                            </select>
                                                                                                                                                                                                                                                                                                    <input type="number" id="jumlah" placeholder="Jumlah (Contoh: 50000)">
                                                                                                                                                                                                                                                                                                            <input type="text" id="ket" placeholder="Keterangan (Contoh: Transfer BRI)">
                                                                                                                                                                                                                                                                                                                    <input type="date" id="tanggal">
                                                                                                                                                                                                                                                                                                                            <button onclick="tambahData()">Simpan Transaksi</button>
                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                    <div class="tabs">
                                                                                                                                                                                                                                                                                                                                            <button class="tab-btn active" onclick="gantiFilter('hari', this)">Harian</button>
                                                                                                                                                                                                                                                                                                                                                    <button class="tab-btn" onclick="gantiFilter('minggu', this)">Mingguan</button>
                                                                                                                                                                                                                                                                                                                                                            <button class="tab-btn" onclick="gantiFilter('bulan', this)">Bulanan</button>
                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                    <div class="chart-box">
                                                                                                                                                                                                                                                                                                                                                                            <canvas id="mainChart"></canvas>
                                                                                                                                                                                                                                                                                                                                                                                </div>

                                                                                                                                                                                                                                                                                                                                                                                    <table>
                                                                                                                                                                                                                                                                                                                                                                                            <thead>
                                                                                                                                                                                                                                                                                                                                                                                                        <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                        <th>Tanggal</th>
                                                                                                                                                                                                                                                                                                                                                                                                                                        <th>Keterangan</th>
                                                                                                                                                                                                                                                                                                                                                                                                                                                        <th>Jumlah</th>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </thead>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <tbody id="list-transaksi"></tbody>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </table>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <button class="btn-reset" onclick="hapusSemua()">Hapus Semua Data</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                // Ambil data dari localStorage saat pertama kali load
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    let transaksi = JSON.parse(localStorage.getItem('data_keuangan')) || [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let myChart = null;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let filterAktif = 'hari';

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('tanggal').valueAsDate = new Date();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function formatIDR(angka) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            return "Rp " + angka.toLocaleString('id-ID');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    // Fungsi simpan ke memori HP
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function saveData() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                localStorage.setItem('data_keuangan', JSON.stringify(transaksi));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function tambahData() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const tipe = document.getElementById('tipe').value;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const jumlah = parseInt(document.getElementById('jumlah').value);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                const ket = document.getElementById('ket').value || "Tanpa Ket.";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const tgl = document.getElementById('tanggal').value;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if (!jumlah || !tgl) return alert("Isi jumlah dan tanggal!");

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        transaksi.push({ tipe, jumlah, ket, tgl, id: Date.now() });
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('jumlah').value = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('ket').value = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                saveData(); // Simpan permanen
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        updateUI();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                function hapusSemua() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        if(confirm("Hapus semua catatan?")) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transaksi = [];
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                saveData();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            updateUI();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function updateUI() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const list = document.getElementById('list-transaksi');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            list.innerHTML = "";
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            let total = 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    transaksi.sort((a, b) => new Date(b.tgl) - new Date(a.tgl));

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            transaksi.forEach(t => {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const isMasuk = t.tipe === 'masuk';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    total += isMasuk ? t.jumlah : -t.jumlah;

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                list.innerHTML += `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <td>${t.tgl}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <td>${t.ket}</td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <td class="amount ${isMasuk ? 'in' : 'out'}">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ${isMasuk ? '+' : '-'}${formatIDR(t.jumlah)}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </td>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </tr>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    `;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            });

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('total-saldo').innerText = formatIDR(total);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            renderChart();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    function gantiFilter(mode, btn) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            filterAktif = mode;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            btn.classList.add('active');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    renderChart();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function renderChart() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const ctx = document.getElementById('mainChart').getContext('2d');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if (myChart) myChart.destroy();

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const dataTerfilter = [...transaksi].reverse().slice(-10); 
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const labels = dataTerfilter.map(t => t.tgl.split('-').slice(1).join('/'));
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const dataPemasukan = dataTerfilter.map(t => t.tipe === 'masuk' ? t.jumlah : 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            const dataPengeluaran = dataTerfilter.map(t => t.tipe === 'keluar' ? t.jumlah : 0);

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    myChart = new Chart(ctx, {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                type: 'bar',
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            data: {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            labels: labels,
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            datasets: [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                { label: 'Masuk', data: dataPemasukan, backgroundColor: '#2ecc71' },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    { label: 'Keluar', data: dataPengeluaran, backgroundColor: '#e74c3c' }
